<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: #0a0a0a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    border: 3px solid #1e40af;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(30,64,175,0.15), transparent);
  }
  .hero { font-size: 140px; font-weight: 700; color: #fff; position: relative; }
  .sub { font-size: 32px; color: #94a3b8; margin-top: 10px; position: relative; }
  .cta { font-size: 28px; color: #60a5fa; margin-top: 30px; position: relative; }
  .bottom { position: absolute; bottom: 40px; font-size: 18px; color: #64748b; }
</style>
</head>
<body>
  <div class="hero">43.5%</div>
  <div class="sub">La France prélève 43.5% de son PIB</div>
  <div class="cta">Simulez ce qui se passe si on ajustait →</div>
  <div class="bottom">laffer.quixotry.app — Sources : INSEE, OCDE, Lefebvre et al. (2025)</div>
</body>
</html>
